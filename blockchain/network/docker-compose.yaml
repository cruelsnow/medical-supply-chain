  peer1.hospital.supplychain.com:
    container_name: peer1.hospital.supplychain.com
    image: hyperledger/fabric-peer:2.2
    platform: linux/amd64
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer1.hospital.supplychain.com
      - CORE_PEER_ADDRESS=peer1.hospital.supplychain.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer1.hospital.supplychain.com:7052
