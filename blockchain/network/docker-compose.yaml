# =============================================================================
# 基于区块链的医用耗材供应链管理系统 - Docker Compose 配置文件
# 功能: 定义Hyperledger Fabric联盟链网络的容器编排
# 包含: 4个组织(Producer/Distributor/Hospital/Regulator) + 3个Orderer节点
# =============================================================================

version: '2.0'

volumes:
  # 排序节点数据卷
  orderer1.supplychain.com:
  orderer2.supplychain.com:
  orderer3.supplychain.com:

  # 生产商组织Peer节点数据卷
  peer0.producer.supplychain.com:
  peer1.producer.supplychain.com:

  # 经销商组织Peer节点数据卷
  peer0.distributor.supplychain.com:
  peer1.distributor.supplychain.com:

  # 医院组织Peer节点数据卷
  peer0.hospital.supplychain.com:
  peer1.hospital.supplychain.com:

  # 监管机构Peer节点数据卷
  peer0.regulator.supplychain.com:
  peer1.regulator.supplychain.com:

networks:
  supplychain-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24

services:
  # ===========================================================================
  # 排序服务节点 (Orderer) - 使用Raft共识机制
  # ===========================================================================
  orderer1.supplychain.com:
    container_name: orderer1.supplychain.com
    image: hyperledger/fabric-orderer:2.2
    platform: linux/amd64
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # TLS配置 - 启用双向TLS认证
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./config/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/supplychain.com/orderers/orderer1.supplychain.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/supplychain.com/orderers/orderer1.supplychain.com/tls:/var/hyperledger/orderer/tls
      - orderer1.supplychain.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
    networks:
      supplychain-network:
        ipv4_address: 172.25.0.11

  orderer2.supplychain.com:
    container_name: orderer2.supplychain.com
    image: hyperledger/fabric-orderer:2.2
    platform: linux/amd64
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=8050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./config/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/supplychain.com/orderers/orderer2.supplychain.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/supplychain.com/orderers/orderer2.supplychain.com/tls:/var/hyperledger/orderer/tls
      - orderer2.supplychain.com:/var/hyperledger/production/orderer
    ports:
      - 8050:8050
    networks:
      supplychain-network:
        ipv4_address: 172.25.0.12

  orderer3.supplychain.com:
    container_name: orderer3.supplychain.com
    image: hyperledger/fabric-orderer:2.2
    platform: linux/amd64
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=9050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./config/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/supplychain.com/orderers/orderer3.supplychain.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/supplychain.com/orderers/orderer3.supplychain.com/tls:/var/hyperledger/orderer/tls
      - orderer3.supplychain.com:/var/hyperledger/production/orderer
    ports:
      - 9050:9050
    networks:
      supplychain-network:
        ipv4_address: 172.25.0.13

  # ===========================================================================
  # 生产商组织 (Producer Organization) - 负责耗材生产与源头赋码
  # ===========================================================================
  peer0.producer.supplychain.com:
    container_name: peer0.producer.supplychain.com
    image: hyperledger/fabric-peer:2.2
    platform: linux/amd64
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.producer.supplychain.com
      - CORE_PEER_ADDRESS=peer0.producer.supplychain.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.producer.supplychain.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.producer.supplychain.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.producer.supplychain.com:7051
      - CORE_PEER_LOCALMSPID=ProducerMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # CouchDB作为状态数据库，支持富查询
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0.producer:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      # 操作服务配置
      - CORE_OPERATIONS_LISTENADDRESS=peer0.producer.supplychain.com:9443
      - CORE_METRICS_PROVIDER=prometheus
      # Chaincode container network config
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=network_supplychain-network
      # Go proxy for chaincode build
      - GOPROXY=https://goproxy.cn,direct
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - ./crypto-config/peerOrganizations/producer.supplychain.com/peers/peer0.producer.supplychain.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/producer.supplychain.com/peers/peer0.producer.supplychain.com/tls:/etc/hyperledger/fabric/tls
      - peer0.producer.supplychain.com:/var/hyperledger/production
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 7051:7051
      - 7052:7052
    depends_on:
      - couchdb0.producer
    networks:
      supplychain-network:
        ipv4_address: 172.25.0.21

  peer1.producer.supplychain.com:
    container_name: peer1.producer.supplychain.com
    image: hyperledger/fabric-peer:2.2
    platform: linux/amd64
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer1.producer.supplychain.com
      - CORE_PEER_ADDRESS=peer1.producer.supplychain.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer1.producer.supplychain.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.producer.supplychain.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.producer.supplychain.com:7051
      - CORE_PEER_LOCALMSPID=ProducerMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1.producer:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=peer1.producer.supplychain.com:9443
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=network_supplychain-network
      - GOPROXY=https://goproxy.cn,direct
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - ./crypto-config/peerOrganizations/producer.supplychain.com/peers/peer1.producer.supplychain.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/producer.supplychain.com/peers/peer1.producer.supplychain.com/tls:/etc/hyperledger/fabric/tls
      - peer1.producer.supplychain.com:/var/hyperledger/production
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 7151:7051
      - 7152:7052
    depends_on:
      - couchdb1.producer
    networks:
      supplychain-network:
        ipv4_address: 172.25.0.22

  # 生产商组织的CouchDB数据库
  couchdb0.producer:
    container_name: couchdb0.producer
    image: hyperledger/fabric-couchdb:0.4.18
    platform: linux/amd64
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 5984:5984
    networks:
      supplychain-network:
        ipv4_address: 172.25.0.31

  couchdb1.producer:
    container_name: couchdb1.producer
    image: hyperledger/fabric-couchdb:0.4.18
    platform: linux/amd64
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 5985:5984
    networks:
      supplychain-network:
        ipv4_address: 172.25.0.32

  # ===========================================================================
